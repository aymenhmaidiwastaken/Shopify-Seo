<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Right-click each canvas below and "Save image as" to save the icons.</p>
<p>icon-16.png:</p><canvas id="c16" width="16" height="16"></canvas><br>
<p>icon-32.png:</p><canvas id="c32" width="32" height="32"></canvas><br>
<p>icon-48.png:</p><canvas id="c48" width="48" height="48"></canvas><br>
<p>icon-128.png:</p><canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background rounded rect
  const r = s * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  // Gradient
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#5E5CE6');
  grad.addColorStop(1, '#4B48C9');
  ctx.fillStyle = grad;
  ctx.fill();

  // Checkmark
  ctx.strokeStyle = 'white';
  ctx.lineWidth = s * 0.12;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(s * 0.25, s * 0.5);
  ctx.lineTo(s * 0.42, s * 0.67);
  ctx.lineTo(s * 0.75, s * 0.33);
  ctx.stroke();
}

['c16', 'c32', 'c48', 'c128'].forEach(id => {
  drawIcon(document.getElementById(id));
});
</script>
</body>
</html>
